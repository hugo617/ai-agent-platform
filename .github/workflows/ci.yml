name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  migrations:
    name: Migrations (alembic upgrade on Postgres)
    runs-on: ubuntu-latest
    # The migration chain is Postgres-only (uses now(), JSONB, +psycopg). Spin
    # up a real Postgres so CI actually applies every migration head — this
    # catches broken upgrades / type drift (e.g. the R9 JSONB fix) before merge.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: aap
          POSTGRES_PASSWORD: aap_secret
          POSTGRES_DB: aap_ci
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U aap"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      APP_ENV: testing
      DATABASE_URL: "postgresql+psycopg://aap:aap_secret@localhost:5432/aap_ci"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Apply all migrations to a fresh DB
        run: alembic upgrade head
      - name: No pending model/migration drift (autogenerate is clean)
        # `alembic check` fails if models and DB schema have diverged. Requires
        # the full chain applied (previous step).
        run: alembic check

  backend:
    name: Backend (pytest + ruff)
    runs-on: ubuntu-latest
    env:
      # Tests use in-memory SQLite (see tests/conftest.py) — no Postgres needed.
      APP_ENV: testing
      DATABASE_URL: "sqlite+aiosqlite:///:memory:"
      OPENAI_API_KEY: "test-key"
      CORS_ORIGINS: "http://localhost:3000"
      JWT_SECRET: "test-secret"
      SALT_ROUNDS: "4" # keep bcrypt cheap in CI
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff
        run: ruff check app/ tests/ scripts/ alembic/

      - name: Pytest
        # The suite builds the full schema from the ORM models on in-memory
        # SQLite (see tests/conftest.py), so this also exercises every model
        # column the migrations create.
        run: pytest -ra --strict-markers

  frontend:
    name: Frontend (typecheck + build + lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (oxlint)
        run: npx oxlint src/

      - name: Typecheck & build
        run: npm run build
