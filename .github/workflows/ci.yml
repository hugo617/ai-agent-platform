name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (pytest + ruff)
    runs-on: ubuntu-latest
    env:
      # Tests use in-memory SQLite (see tests/conftest.py) — no Postgres needed.
      APP_ENV: testing
      DATABASE_URL: "sqlite+aiosqlite:///:memory:"
      OPENAI_API_KEY: "test-key"
      CORS_ORIGINS: "http://localhost:3000"
      JWT_SECRET: "test-secret"
      SALT_ROUNDS: "4" # keep bcrypt cheap in CI
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff
        run: ruff check app/ tests/ scripts/ alembic/

      - name: Pytest
        # The suite builds the full schema from the ORM models on in-memory
        # SQLite (see tests/conftest.py), so this also exercises every model
        # column the migrations create — no Postgres service required.
        run: pytest -ra --strict-markers

  frontend:
    name: Frontend (typecheck + build + lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (oxlint)
        run: npx oxlint src/

      - name: Typecheck & build
        run: npm run build
