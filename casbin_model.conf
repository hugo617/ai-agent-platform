# RBAC with domains (tenants) — multi-tenant permission model for agenthub
# Request: subject (user id), domain (tenant id), object (resource), action

[request_definition]
r = sub, dom, obj, act

[policy_definition]
p = sub, dom, obj, act

[role_definition]
g = _, _, _

[policy_effect]
e = some(where (p.eft == allow))

[matchers]
# A request is allowed if:
#   1. the subject inherits a role in the same domain (g with domain), AND
#   2. there is a matching policy in the same domain, AND
#   3. the object matches (supports wildcards via keyMatch), AND
#   4. the action matches exactly.
m = g(r.sub, p.sub, r.dom) && r.dom == p.dom && keyMatch(r.obj, p.obj) && r.act == p.act
